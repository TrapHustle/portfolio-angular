<section class="contact" id="contact">
  <div class="container">
    <h2 class="section-title">Get In Touch</h2>
    
    <div class="contact-wrapper">
      <div class="contact-info">
        <h3>Let's work together</h3>
        <p>I'm always interested in hearing about new projects and opportunities. Feel free to reach out!</p>
        
        <div class="contact-details">
          <div class="detail-item">
            <strong>Email:</strong>
            <a href="mailto:hello@johnanderson.dev">hello@johnanderson.dev</a>
          </div>
          <div class="detail-item">
            <strong>Location:</strong>
            <span>San Francisco, CA</span>
          </div>
          <div class="detail-item">
            <strong>Available for:</strong>
            <span>Freelance projects, Full-time roles, Consulting</span>
          </div>
        </div>
      </div>
      
      <form class="contact-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <input 
            type="text" 
            [(ngModel)]="formData.fullName" 
            name="fullName"
            placeholder="Your Name"
            required
            class="form-input">
        </div>
        
        <div class="form-group">
          <input 
            type="email" 
            [(ngModel)]="formData.email" 
            name="email"
            placeholder="Your Email"
            required
            class="form-input">
        </div>
        
        <div class="form-group">
          <textarea 
            [(ngModel)]="formData.message" 
            name="message"
            placeholder="Your Message"
            rows="6"
            required
            class="form-textarea"></textarea>
        </div>
        
        <button 
          type="submit" 
          class="btn btn-primary"
          [disabled]="loading">
          {{ loading ? 'Sending...' : 'Send Message' }}
        </button>
        
        <div *ngIf="submitted" class="success-message">
          ✓ Thank you! I'll get back to you soon.
        </div>
      </form>
    </div>
  </div>
</section>
