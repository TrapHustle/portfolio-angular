<section class="hero">
  <div class="hero-container">
    <div class="hero-content">
      <!-- Profile Image -->
      <div class="profile-image-wrapper">
        <img 
          *ngIf="avatarUrl"
          [src]="avatarUrl"
          [alt]="firstName"
          class="profile-image"
        />
      </div>

      <!-- Profile Info -->
      <div class="profile-info">
        <div class="availability-badge">
          <span>{{ isAvailable ? 'Available for work' : 'Not available' }}</span>
        </div>

        <h1 class="profile-name">{{ firstName }} {{ lastName }}</h1>

        <!-- Action Buttons -->
        <div class="action-buttons">
          <button class="btn btn-secondary" (click)="downloadCV()">
            Download CV
          </button>
          <button class="btn btn-primary" (click)="scrollToContact()">
            Contact Me
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
